```yaml
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BINARY_NAME: quicktasks

jobs:
  build:
    name: ${{ matrix.variant }} • ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        variant: [default, fire-and-forget, ui, fire-and-forget-ui]

        include:
          # ================= LINUX =================
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: quicktasks

          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: quicktasks

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            binary_name: quicktasks

          # ================= MACOS =================
          - os: macos-14 # Apple Silicon (M1/M2/M3)
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: quicktasks

          - os: macos-13 # Intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: quicktasks

          # ================= WINDOWS =================
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: quicktasks.exe

    steps:
      - uses: actions/checkout@v4

      # ================= TOOLCHAIN =================
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      # ================= LINUX DEPS =================
      - name: Install MUSL tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install ARM64 cross compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      # ================= BUILD =================
      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --target ${{ matrix.target }} --features "${{ matrix.features }}"
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      # ================= STRIP =================
      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary_name }} || true

      # ================= ARCHIVE NAME =================
      - name: Compute archive name
        shell: bash
        run: |
          echo "ARCHIVE_NAME=${BINARY_NAME}-${{ matrix.variant }}-${{ matrix.target }}.${{ matrix.archive_ext }}" >> $GITHUB_ENV

      # ================= PACKAGE UNIX =================
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/package
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/package/
          cp Cargo.toml dist/package/ || true
          cp data.json dist/package/ || true
          cp -r static dist/package/static || true

          tar -C dist/package -czf dist/${ARCHIVE_NAME} .

      # ================= PACKAGE WINDOWS =================
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/package/"
          if (Test-Path "Cargo.toml") { Copy-Item Cargo.toml "dist/package/" }
          if (Test-Path "data.json") { Copy-Item data.json "dist/package/" }
          if (Test-Path "static") { Copy-Item static "dist/package/static" -Recurse }

          Compress-Archive -Path dist/package/* -DestinationPath "dist/$env:ARCHIVE_NAME"

      # ================= UPLOAD =================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: dist/${{ env.ARCHIVE_NAME }}

      # ================= RELEASE =================
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARCHIVE_NAME }}

  # ================= DOCKER =================
  docker:
    name: Docker (${{ matrix.variant }})
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    strategy:
      matrix:
        variant: [default, fire-and-forget, ui, fire-and-forget-ui]

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: quicktasks-${{ matrix.variant }}-x86_64-unknown-linux-gnu.tar.gz
          path: dist

      - name: Extract
        run: |
          mkdir -p package
          tar -xzf dist/quicktasks-${{ matrix.variant }}-x86_64-unknown-linux-gnu.tar.gz -C package

      # ================= DOCKER BUILDX =================
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ================= TAGS =================
      - name: Set Docker tags
        id: tags
        run: |
          if [ "${{ matrix.variant }}" = "default" ]; then
            echo "TAGS=ghcr.io/${{ github.repository }}:${{ github.ref_name }},ghcr.io/${{ github.repository }}:latest" >> $GITHUB_OUTPUT
          else
            echo "TAGS=ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.variant }}" >> $GITHUB_OUTPUT
          fi

      # ================= BUILD & PUSH =================
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.TAGS }}
```
